server {
    server_name taqwapath.com www.taqwapath.com;

    root /home/ubuntu/taqwapath;
    index index.html;

    access_log /var/log/nginx/taqwapath.access.log;
    error_log /var/log/nginx/taqwapath.error.log;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), payment=(), usb=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.google-analytics.com https://www.paypal.com https://www.paypalobjects.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https://www.paypalobjects.com https://www.google-analytics.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://api.aladhan.com https://api.alquran.cloud https://quranicaudio.com https://download.quranicaudio.com https://nominatim.openstreetmap.org https://ipapi.co https://open.er-api.com https://www.google-analytics.com; media-src 'self' https://download.quranicaudio.com; frame-src https://www.paypal.com; form-action 'self' https://www.paypal.com; object-src 'none'; base-uri 'self'; frame-ancestors 'none'; upgrade-insecure-requests" always;

    rewrite ^/hadees/?$ /hadith permanent;
    rewrite ^/hadees/([^/]+):([0-9]+)/?$ /hadith/$1-$2 permanent;
    rewrite ^/hadees/(.+)$ /hadith/$1 permanent;
    rewrite ^/listen-quran/?$ /quran-online permanent;
    rewrite ^/listen-quran/(.+)$ /quran-online permanent;

    location / {
        if ($uri ~ "^(.+)/+$") {
            return 301 $1$is_args$args;
        }

        try_files $uri/index.html $uri =404;
    }

    location ~* \.(?:css|js|map|jpg|jpeg|png|gif|ico|svg|webp|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        try_files $uri =404;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/taqwapath.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/taqwapath.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.taqwapath.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    if ($host = taqwapath.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name taqwapath.com www.taqwapath.com;
    return 404; # managed by Certbot
}
